<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ripple on Mouse Move</title>
  <style>
    body {
      margin: 0;
      background: #111;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .filtered-image {
      width: 400px;
      height: 300px;
      transition: filter 0.3s ease;
    }
  </style>
</head>
<body>

  <!-- SVG Filter -->
  <svg width="0" height="0">
    <filter id="rippleFilter">
      <feTurbulence id="turbulence" type="turbulence" baseFrequency="0.01 0.01" numOctaves="2" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="0" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <!-- Image with no filter initially -->
  <img src="https://picsum.photos/id/1015/400/300" alt="Ripple" class="filtered-image" id="image" />

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- Script for mouse interaction -->
  <script>
    const img = document.getElementById("image");
    const displacement = document.querySelector("feDisplacementMap");
    const turbulence = document.getElementById("turbulence");

    let filterApplied = false;

    img.addEventListener("mousemove", (e) => {
      if (!filterApplied) {
        img.style.filter = "url(#rippleFilter)";
        filterApplied = true;
      }

      // Animate ripple scale on movement
      gsap.to(displacement, {
        attr: { scale: 15 },
        duration: 0.3,
        overwrite: true
      });

      // Optionally animate baseFrequency dynamically with cursor X
      const x = e.offsetX / img.clientWidth;
      const y = e.offsetY / img.clientHeight;
      const freqX = (0.01 + x * 0.03).toFixed(3);
      const freqY = (0.01 + y * 0.03).toFixed(3);

      gsap.to(turbulence, {
        attr: { baseFrequency: `${freqX} ${freqY}` },
        duration: 0.3,
        overwrite: true
      });

      // Slowly fade out the effect if mouse stops moving
      clearTimeout(img._rippleTimeout);
      img._rippleTimeout = setTimeout(() => {
        gsap.to(displacement, {
          attr: { scale: 0 },
          duration: 1
        });
      }, 100);
    });
  </script>

</body>
</html>
